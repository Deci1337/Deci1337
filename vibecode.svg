<svg width="420" height="70" viewBox="0 0 420 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7a5800"/>
      <stop offset="30%"  stop-color="#FFD700"/>
      <stop offset="50%"  stop-color="#FFF8C0"/>
      <stop offset="70%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#7a5800"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-1 0" to="1 0" dur="2s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7a5800"/>
      <stop offset="50%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#7a5800"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-1 0" to="1 0" dur="2s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="420" height="70" rx="12" fill="#0d0d0d"/>

  <!-- outer border glow -->
  <rect x="1" y="1" width="418" height="68" rx="11" fill="none"
    stroke="url(#borderGlow)" stroke-width="2" filter="url(#glow2)" opacity="0.8"/>

  <!-- inner border -->
  <rect x="3" y="3" width="414" height="64" rx="9" fill="none"
    stroke="url(#borderGlow)" stroke-width="1" opacity="0.5"/>

  <!-- corner diamonds -->
  <text x="12"  y="42" font-size="14" fill="#FFD700" filter="url(#glow)" opacity="0.9">◆</text>
  <text x="392" y="42" font-size="14" fill="#FFD700" filter="url(#glow)" opacity="0.9">◆</text>

  <!-- main text -->
  <text x="210" y="44"
    font-family="Georgia, serif"
    font-size="24"
    font-weight="bold"
    text-anchor="middle"
    fill="url(#shine)"
    filter="url(#glow)">
    VIBECODE SENIOR+
  </text>
</svg>
