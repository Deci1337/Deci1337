<svg xmlns="http://www.w3.org/2000/svg" width="560" height="110" viewBox="0 0 560 110">
  <defs>
    <style>
      .num {
        font-family: 'Courier New', Courier, monospace;
        font-size: 40px;
        font-weight: 900;
        text-anchor: middle;
        dominant-baseline: central;
        fill: #16a34a;
        opacity: 0;
      }
      .gold {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
        fill: #F59E0B;
        letter-spacing: 0.3px;
      }
      @keyframes tick {
        0%   { opacity: 1; }
        80%  { opacity: 1; }
        100% { opacity: 0; }
      }
      @keyframes final {
        0%  { opacity: 0; }
        8%  { opacity: 1; }
        100%{ opacity: 1; }
      }
      .s0  { animation: tick  0.15s 0.00s forwards; }
      .s1  { animation: tick  0.15s 0.15s forwards; }
      .s2  { animation: tick  0.15s 0.30s forwards; }
      .s3  { animation: tick  0.15s 0.45s forwards; }
      .s4  { animation: tick  0.15s 0.60s forwards; }
      .s5  { animation: tick  0.15s 0.75s forwards; }
      .s6  { animation: tick  0.15s 0.90s forwards; }
      .s7  { animation: tick  0.15s 1.05s forwards; }
      .s8  { animation: tick  0.15s 1.20s forwards; }
      .s9  { animation: tick  0.15s 1.35s forwards; }
      .s10 { animation: tick  0.15s 1.50s forwards; }
      .s11 { animation: tick  0.15s 1.65s forwards; }
      .s12 { animation: final 0.25s 1.80s forwards; }
    </style>
  </defs>

  <text class="num s0"  x="280" y="52">&#8381; 0</text>
  <text class="num s1"  x="280" y="52">&#8381; 127 834</text>
  <text class="num s2"  x="280" y="52">&#8381; 489 100</text>
  <text class="num s3"  x="280" y="52">&#8381; 832 450</text>
  <text class="num s4"  x="280" y="52">&#8381; 1 234 600</text>
  <text class="num s5"  x="280" y="52">&#8381; 1 789 230</text>
  <text class="num s6"  x="280" y="52">&#8381; 2 341 780</text>
  <text class="num s7"  x="280" y="52">&#8381; 2 998 450</text>
  <text class="num s8"  x="280" y="52">&#8381; 3 567 200</text>
  <text class="num s9"  x="280" y="52">&#8381; 4 102 900</text>
  <text class="num s10" x="280" y="52">&#8381; 4 567 800</text>
  <text class="num s11" x="280" y="52">&#8381; 4 891 300</text>
  <text class="num s12" x="280" y="52">&#8381; 5 000 000</text>

  <text class="gold" x="280" y="90">Столько мои ИИ-агенты УЖЕ экономят бизнесам в год.</text>
</svg>
